<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Calculadora de Lotaje XAUUSD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07090f;
      --panel:#101522;
      --text:#eaf0ff;
      --muted:#96a3c4;
      --gold:#d5b15b;
      --gold-2:#f0cf82;
      --green:#16c56d;
      --green-2:#4be08f;
      --red:#ef4444;
      --red-2:#ff7b7b;
      --blue:#67a5ff;
      --purple:#9f7aea;
      --line:rgba(255,255,255,.07);
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:20px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(213,177,91,.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(103,165,255,.07), transparent 26%),
        linear-gradient(180deg,#05070b,#0a0e15 45%,#080b12);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.14;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:radial-gradient(circle at center, black, transparent 85%);
    }

    .container{
      max-width:1280px;
      margin:0 auto;
      padding:20px 16px;
    }

    .card{
      background:linear-gradient(180deg, rgba(18,23,36,.95), rgba(12,16,26,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-body{padding:18px}
    .calc-shell{display:grid;gap:18px}

    .calc-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .calc-title{
      font-family:Cinzel,serif;
      font-size:24px;
      color:var(--gold-2);
    }

    .calc-badge{
      font:700 11px JetBrains Mono,monospace;
      letter-spacing:.08em;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(213,177,91,.10);
      border:1px solid rgba(213,177,91,.24);
      color:var(--gold-2);
    }

    .card-sub{
      font-size:13px;
      color:var(--muted);
    }

    .calc-global{
      display:flex;
      align-items:center;
      gap:26px;
      flex-wrap:wrap;
      padding:18px 20px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,.012));
      border:1px solid var(--line);
    }

    .eyebrow{
      font:700 10px JetBrains Mono,monospace;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--gold-2);
      margin-bottom:10px;
    }

    .big-input{
      width:120px;
      font-size:32px;
      text-align:center;
      font-weight:800;
      color:var(--gold-2);
    }

    .partial-input{
      width:120px;
      font-size:32px;
      text-align:center;
      font-weight:800;
      color:var(--gold-2);
    }

    .calc-warn{
      display:none;
      font-size:12px;
      color:#ffd0d0;
      background:rgba(240,82,82,.10);
      border:1px solid rgba(240,82,82,.22);
      padding:8px 12px;
      border-radius:12px;
    }

    .pf-input,.ghost-btn,.primary-btn{
      width:100%;
      border:none;
      outline:none;
      background:rgba(255,255,255,.04);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 13px;
      font-size:14px;
    }

    .ghost-btn,.primary-btn{
      width:auto;
      cursor:pointer;
      transition:.2s ease;
      font-weight:700;
    }

    .primary-btn{
      background:linear-gradient(135deg, rgba(213,177,91,.24), rgba(213,177,91,.12));
      color:var(--gold-2);
      border:1px solid rgba(213,177,91,.26);
    }

    .ghost-btn{
      background:rgba(255,255,255,.03);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
    }

    .primary-btn:hover,.ghost-btn:hover{
      transform:translateY(-1px);
    }

    select{
      background:#0f1523;
      color:#eef3ff;
    }

    select option{
      background:#0f1523;
      color:#eef3ff;
    }

    .calc-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:14px;
    }

    .lot-card{
      background:linear-gradient(180deg, rgba(19,25,38,.98), rgba(13,18,28,.98));
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .lot-head{
      padding:16px 16px 14px;
      border-top:3px solid var(--lot-accent);
    }

    .lot-head-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:14px;
    }

    .lot-title-input{
      font-weight:800;
      font-size:18px;
      background:rgba(255,255,255,.03)!important;
    }

    .field-group{
      display:grid;
      gap:8px;
    }

    .field-label{
      font:700 11px JetBrains Mono,monospace;
      letter-spacing:.1em;
      color:var(--gold-2);
      text-transform:uppercase;
    }

    .lot-output{
      padding:16px;
      background:rgba(255,255,255,.025);
      border-top:1px solid var(--line);
      text-align:center;
    }

    .lot-values{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:stretch;
      margin-top:6px;
    }

    .lot-box{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      padding:14px 10px;
      display:grid;
      gap:8px;
      align-items:center;
      justify-items:center;
    }

    .lot-box-label{
      font:700 10px JetBrains Mono,monospace;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .lot-number{
      font-size:32px;
      line-height:1.05;
      font-weight:800;
      color:var(--gold-2);
      word-break:break-word;
    }

    .lot-mini{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .lot-pill{
      font-size:12px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
    }

    .risk-buttons{
      display:flex;
      gap:6px;
    }

    .risk-buttons button{
      flex:1;
      padding:8px 8px;
      font-size:12px;
      min-width:0;
    }

    .valid-range{
      font-size:18px;
      font-weight:800;
      color:var(--gold-2);
      margin-top:4px;
      font-style:italic;
    }

    .toast{
      position:fixed;
      right:16px;
      bottom:16px;
      padding:13px 16px;
      border-radius:16px;
      background:#0e1525;
      border:1px solid rgba(31,201,121,.22);
      color:#bfffd9;
      box-shadow:var(--shadow);
      transform:translateY(20px);
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:220;
    }

    .toast.show{
      transform:translateY(0);
      opacity:1;
    }

    @media (max-width:760px){
      .calc-global{padding:14px}
      .calc-title{font-size:20px}
      .lot-number{font-size:28px}
      .risk-buttons button{padding:7px 6px;font-size:11px}
    }

    @media (max-width:560px){
      .container{padding:12px}
      .card-body{padding:14px}
      .calc-global{gap:16px}
      .lot-values{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="card-body calc-shell">
        <div class="calc-header">
          <div>
            <div class="calc-title">XAUUSD · Calculadora de lotaje</div>
            <div class="card-sub">Pip value $10 por lote · 1 lote × 10 pips = $100</div>
          </div>
          <div class="calc-badge">Gold / USD</div>
        </div>

        <div class="calc-global">
          <div>
            <div class="eyebrow" style="margin-bottom:8px">Stop loss global</div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <input
                type="number"
                id="sl-global"
                class="pf-input big-input"
                min="1"
                max="500"
                value="50"
                step="1"
              >
              <span style="font-size:18px;color:var(--muted)">pips</span>
            </div>
          </div>

          <div>
            <div class="eyebrow" style="margin-bottom:8px">% parcial</div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <input
                type="number"
                id="partial-percent"
                class="pf-input partial-input"
                min="0"
                max="100"
                value="50"
                step="0.1"
              >
              <span style="font-size:18px;color:var(--muted)">%</span>
            </div>
          </div>

          <div>
            <div class="card-sub">Rango válido</div>
            <div class="valid-range">1 – 500 pips</div>
          </div>

          <div class="calc-warn" id="sl-warn">SL fuera de rango (1–500)</div>
        </div>

        <div class="calc-grid" id="lot-grid"></div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GOOGLE_SHEET_ID = '1_hxP4y0r1DLhqkmd-XMXj2a-RFCjBvT9rpYkAYNvekE';
    const API_URL = 'https://script.google.com/macros/s/AKfycbwheDzOzoJQqS2T-13kXYh_0B2lS6kqajj4bL5rQoB_BcWn3l0NXfyadZhA84LWdQmN0w/exec';
    const OFFLINE_CACHE_KEY = 'tshield_calc_offline_cache_v1';

    const LOT_FIRMS = [
      { id:'lot1', name:'Calculadora 1', top:'#378ADD', titleColor:'#67a5ff', activeBg:'#185FA5', activeText:'#B5D4F4' },
      { id:'lot2', name:'Calculadora 2', top:'#EFB72A', titleColor:'#f4c84f', activeBg:'#8A6610', activeText:'#FFF0B3' },
      { id:'lot3', name:'Calculadora 3', top:'#7F77DD', titleColor:'#9f7aea', activeBg:'#534AB7', activeText:'#EEEDFE' },
      { id:'lot4', name:'Calculadora 4', top:'#EF4444', titleColor:'#ef4444', activeBg:'#982B2B', activeText:'#FFD6D6' }
    ];

    const RISKS = [0.1, 0.25, 0.5, 1];
    const BALANCES = [5000, 10000, 15000, 20000, 25000, 50000, 100000, 200000];
    const PIP_VAL = 10;

    const lotState = {};
    LOT_FIRMS.forEach(f => {
      lotState[f.id] = {
        id: f.id,
        risk: 0.5,
        balance: 10000,
        title: f.name
      };
    });

    function toast(msg, good = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.borderColor = good ? 'rgba(31,201,121,.25)' : 'rgba(240,82,82,.25)';
      el.style.color = good ? '#bfffd9' : '#ffd0d0';
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function saveOfflineCache() {
      const payload = {
        savedAt: new Date().toISOString(),
        partialPercent: getPartialPercent(),
        lotCalcSettings: [
          ...Object.values(lotState).map(s => ({
            id: s.id,
            title: s.title,
            balance: s.balance,
            risk: s.risk,
            stopLoss: getSL(),
            partialPercent: getPartialPercent(),
            updatedAt: new Date().toISOString()
          })),
          {
            id: 'global',
            title: 'global',
            balance: '',
            risk: '',
            stopLoss: getSL(),
            partialPercent: getPartialPercent(),
            updatedAt: new Date().toISOString()
          }
        ]
      };
      localStorage.setItem(OFFLINE_CACHE_KEY, JSON.stringify(payload));
    }

    function getOfflineCache() {
      try {
        return JSON.parse(localStorage.getItem(OFFLINE_CACHE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function hydrateLotSettings(rows) {
      LOT_FIRMS.forEach(f => {
        const row = rows.find(x => x.id === f.id) || {};
        lotState[f.id] = {
          id: f.id,
          risk: Number(row.risk || 0.5),
          balance: Number(row.balance || 10000),
          title: row.title || f.name
        };
      });

      const globalRow = rows.find(x => x.id === 'global');
      if (globalRow) {
        const slEl = document.getElementById('sl-global');
        const partialEl = document.getElementById('partial-percent');

        if (slEl && globalRow.stopLoss) {
          slEl.value = Number(globalRow.stopLoss || 50);
        }

        if (partialEl && globalRow.partialPercent !== undefined && globalRow.partialPercent !== '') {
          partialEl.value = Number(globalRow.partialPercent || 50);
        }
      }
    }

    function hydrateFromOfflineCache() {
      const cache = getOfflineCache();
      if (!cache || typeof cache !== 'object') return false;
      if (!Array.isArray(cache.lotCalcSettings) || !cache.lotCalcSettings.length) return false;

      hydrateLotSettings(cache.lotCalcSettings);

      if (cache.partialPercent !== undefined && cache.partialPercent !== null) {
        const partialEl = document.getElementById('partial-percent');
        if (partialEl) partialEl.value = Number(cache.partialPercent);
      }

      return true;
    }

    async function apiGet(action) {
      const res = await fetch(
        `${API_URL}?action=${encodeURIComponent(action)}&sheetId=${encodeURIComponent(GOOGLE_SHEET_ID)}&t=${Date.now()}`
      );

      const text = await res.text();
      let data = {};

      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(`Respuesta no JSON: ${text.slice(0, 200)}`);
      }

      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.ok) throw new Error(data.error || 'Error backend GET');

      return data;
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ ...payload, sheetId: GOOGLE_SHEET_ID })
      });

      const text = await res.text();
      let data = {};

      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(`Respuesta no JSON: ${text.slice(0, 200)}`);
      }

      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.ok) throw new Error(data.error || 'Error backend POST');

      return data;
    }

    async function loadRemoteData() {
      const data = await apiGet('loadAll');
      hydrateLotSettings(data.lotCalcSettings || []);
      saveOfflineCache();
    }

    function buildLotCards() {
      const grid = document.getElementById('lot-grid');

      grid.innerHTML = LOT_FIRMS.map(f => `
        <article class="lot-card" style="--lot-accent:${f.top}">
          <div class="lot-head">
            <div class="lot-head-top">
              <input
                class="pf-input lot-title-input"
                type="text"
                id="lot-title-${f.id}"
                value="${escapeHtml(lotState[f.id].title)}"
                oninput="setLotTitle('${f.id}', this.value)"
                onchange="persistLotSetting('${f.id}')"
                style="color:${f.titleColor}"
              >
              <span class="card-sub" id="${f.id}-pct">0.5% riesgo</span>
            </div>

            <div class="field-group" style="margin-bottom:12px">
              <label class="field-label">Saldo de cuenta</label>
              <select class="pf-input" id="bal-${f.id}" onchange="onBalChange('${f.id}', this.value)">
                ${BALANCES.map(b => `<option value="${b}">$${b.toLocaleString()}</option>`).join('')}
                <option value="custom">Personalizado...</option>
              </select>
              <input
                class="pf-input"
                type="number"
                id="bc-${f.id}"
                placeholder="Escribe el monto"
                min="100"
                step="500"
                style="display:none"
                oninput="onCustomBal('${f.id}', this.value)"
                onchange="persistLotSetting('${f.id}')"
              >
            </div>

            <div class="field-group">
              <label class="field-label">Riesgo por operación</label>
              <div class="risk-buttons" id="rb-${f.id}">
                ${RISKS.map(r => `
                  <button
                    type="button"
                    class="ghost-btn"
                    id="rbtn-${f.id}-${r}"
                    onclick="setRisk('${f.id}', ${r})"
                  >${r}%</button>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="lot-output">
            <div class="eyebrow" style="margin-bottom:8px">Lotaje</div>

            <div class="lot-values">
              <div class="lot-box">
                <div class="lot-box-label">Lot Total</div>
                <div class="lot-number" id="${f.id}-lot">–</div>
              </div>

              <div class="lot-box">
                <div class="lot-box-label">Parcial</div>
                <div class="lot-number" id="${f.id}-partial-lot">–</div>
              </div>
            </div>

            <div class="lot-mini">
              <span class="lot-pill" id="${f.id}-usd">– en riesgo</span>
              <span class="lot-pill" id="${f.id}-tp2">TP 1:2 → –</span>
              <span class="lot-pill" id="${f.id}-partial-label">Cerrar parcial: –</span>
            </div>

            <div class="card-sub" style="margin-top:10px" id="${f.id}-meta">– pips · $–/pip</div>
          </div>
        </article>
      `).join('');

      LOT_FIRMS.forEach(f => {
        const state = lotState[f.id];
        const select = document.getElementById(`bal-${f.id}`);
        const customInput = document.getElementById(`bc-${f.id}`);

        if (BALANCES.includes(Number(state.balance))) {
          select.value = String(state.balance);
          customInput.style.display = 'none';
        } else {
          select.value = 'custom';
          customInput.style.display = 'block';
          customInput.value = state.balance;
        }

        setRisk(f.id, state.risk, false);
      });

      recalcAllLots(false);
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, s => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[s]));
    }

    function setLotTitle(id, val) {
      lotState[id].title = val;
      saveOfflineCache();
    }

    async function saveLotSetting(id) {
      const s = lotState[id];
      await apiPost({
        action: 'saveLotCalcSetting',
        setting: {
          id: s.id,
          title: s.title,
          balance: s.balance,
          risk: s.risk,
          stopLoss: getSL(),
          partialPercent: getPartialPercent(),
          updatedAt: new Date().toISOString()
        }
      });
    }

    async function saveGlobalSL() {
      await apiPost({
        action: 'saveLotCalcSetting',
        setting: {
          id: 'global',
          title: 'global',
          balance: '',
          risk: '',
          stopLoss: getSL(),
          partialPercent: getPartialPercent(),
          updatedAt: new Date().toISOString()
        }
      });
    }

    async function persistLotSetting(id) {
      try {
        await saveLotSetting(id);
        toast('Configuración guardada');
      } catch (err) {
        console.error(err);
        toast('Configuración guardada solo offline', false);
      }
    }

    async function onBalChange(id, val) {
      const customInput = document.getElementById('bc-' + id);

      if (val === 'custom') {
        customInput.style.display = 'block';
        customInput.focus();
        return;
      }

      customInput.style.display = 'none';
      lotState[id].balance = parseFloat(val);
      recalcLot(id);
      saveOfflineCache();

      try {
        await saveLotSetting(id);
        toast('Saldo actualizado');
      } catch (err) {
        console.error(err);
        toast('Saldo guardado solo offline', false);
      }
    }

    function onCustomBal(id, val) {
      const n = parseFloat(val);
      if (!isNaN(n) && n > 0) {
        lotState[id].balance = n;
        recalcLot(id);
        saveOfflineCache();
      }
    }

    async function setRisk(id, risk, persist = true) {
      lotState[id].risk = risk;

      RISKS.forEach(r => {
        const btn = document.getElementById(`rbtn-${id}-${r}`);
        const f = LOT_FIRMS.find(x => x.id === id);
        const active = r === risk;

        btn.style.background = active ? f.activeBg : 'rgba(255,255,255,.03)';
        btn.style.color = active ? f.activeText : 'var(--muted)';
        btn.style.border = `1px solid ${active ? f.activeBg : 'rgba(255,255,255,.08)'}`;
      });

      recalcLot(id);
      saveOfflineCache();

      if (persist) {
        try {
          await saveLotSetting(id);
          toast('Riesgo actualizado');
        } catch (err) {
          console.error(err);
          toast('Riesgo guardado solo offline', false);
        }
      }
    }

    function getSL() {
      return parseFloat(document.getElementById('sl-global').value) || 50;
    }

    function getPartialPercent() {
      return parseFloat(document.getElementById('partial-percent').value) || 0;
    }

    async function recalcAllLots(persist = true) {
      const sl = getSL();

      document.getElementById('sl-warn').style.display =
        (sl < 1 || sl > 500) ? 'block' : 'none';

      LOT_FIRMS.forEach(f => recalcLot(f.id));
      saveOfflineCache();

      if (persist) {
        try {
          await saveGlobalSL();
        } catch (err) {
          console.error(err);
        }
      }
    }

    function recalcLot(id) {
      const sl = getSL();
      const partialPercent = getPartialPercent();
      const { balance, risk } = lotState[id];

      const dr = balance * (risk / 100);
      const lot = dr / (sl * PIP_VAL);
      const partialLot = lot * (partialPercent / 100);

      document.getElementById(`${id}-lot`).textContent =
        isFinite(lot) ? lot.toFixed(2) : '0.00';

      document.getElementById(`${id}-partial-lot`).textContent =
        isFinite(partialLot) ? partialLot.toFixed(2) : '0.00';

      document.getElementById(`${id}-usd`).textContent =
        `$${dr.toFixed(2)} en riesgo`;

      document.getElementById(`${id}-tp2`).textContent =
        `TP 1:2 → $${(dr * 2).toFixed(2)}`;

      document.getElementById(`${id}-partial-label`).textContent =
        `Cerrar parcial: ${partialPercent}%`;

      document.getElementById(`${id}-meta`).textContent =
        `${sl} pips SL · $${(lot * PIP_VAL).toFixed(2)}/pip`;

      document.getElementById(`${id}-pct`).textContent =
        `${risk}% riesgo`;
    }

    async function refreshRemoteAndRender(successMsg) {
      try {
        await loadRemoteData();
        buildLotCards();
        if (successMsg) toast(successMsg);
      } catch (err) {
        console.error('SYNC ERROR:', err);
        hydrateFromOfflineCache();
        buildLotCards();
        if (successMsg) toast('No se pudo sincronizar remoto', false);
      }
    }

    document.getElementById('sl-global').addEventListener('input', () => recalcAllLots(false));
    document.getElementById('sl-global').addEventListener('change', () => recalcAllLots(true));

    document.getElementById('partial-percent').addEventListener('input', () => recalcAllLots(false));
    document.getElementById('partial-percent').addEventListener('change', () => recalcAllLots(true));

    (async function init() {
      try {
        hydrateFromOfflineCache();
        buildLotCards();
        await refreshRemoteAndRender('Datos cargados desde Google Sheets');
      } catch (err) {
        console.error('INIT ERROR:', err);
        buildLotCards();
        toast('La app cargó en modo seguro', false);
      }
    })();
  </script>
</body>
</html>
